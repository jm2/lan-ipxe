where: os.name == "linux"
actions:
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/yum.repos.d/antigravity.repo
  - /etc/yum.repos.d/antigravity.repo
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/yum.repos.d/vscodium.repo
  - /etc/yum.repos.d/vscodium.repo
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    dnf install -y
    https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm
    https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
- action: command.run
  privileged: true
  command: ln
  args:
  - -sf
  - /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
  - /etc/ssl/certs/ca-certificates.crt
- action: command.run
  privileged: true
  command: ln
  args:
  - -sf
  - /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
  - /etc/pki/tls/certs/ca-bundle.crt
- action: command.run
  command: bash
  args:
  - -c
  - >-
    [ -f ~/.local/bin/speedtest ] ||
    ( ARCH=$(uname -m) &&
    mkdir -p ~/.local/bin &&
    curl -fLo /tmp/speedtest.tgz
    "https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-linux-${ARCH}.tgz" &&
    tar xzf /tmp/speedtest.tgz -C ~/.local/bin speedtest &&
    chmod +x ~/.local/bin/speedtest &&
    rm -f /tmp/speedtest.tgz )
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    cp files/etc/yum.repos.d/google-chrome.repo /etc/yum.repos.d/google-chrome.repo;
    fi
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    cp files/etc/yum.repos.d/rpmfusion-nonfree-nvidia-driver.repo /etc/yum.repos.d/rpmfusion-nonfree-nvidia-driver.repo;
    fi
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    cp files/etc/yum.repos.d/rpmfusion-nonfree-steam.repo /etc/yum.repos.d/rpmfusion-nonfree-steam.repo;
    fi
- action: command.run
  privileged: true
  command: rpmkeys
  args:
  - --import
  - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/-/raw/master/pub.gpg
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    rpmkeys --import https://dl.google.com/linux/linux_signing_key.pub;
    fi
- action: package.install
  list:
  - abattis-cantarell-fonts
  - alsa-sof-firmware
  - antigravity
  - bash-completion
  - bc
  - bluez
  - bluez-tools
  - brasero
  - cargo
  - ccache
  - chromium
  - chrony
  - clang
  - codium
  - cronie
  - cups
  - cups-pk-helper
  - curl
  - dkms
  - '@development-tools'
  - dos2unix
  - dracut
  - dtc
  - efibootmgr
  - elfutils-libelf-devel
  - erofs-utils
  - flatpak
  - gcc
  - gdb
  - git-lfs
  - '@gnome-desktop'
  - gnome-extensions-app
  - gnome-shell-extension-appindicator
  - gnome-shell-extension-dash-to-dock
  - gnome-shell-extension-freon
  - gnome-shell-extension-system-monitor
  - gnome-tweaks
  - gnupg2
  - kernel-headers
  - gnutls-devel
  - golang
  - google-noto-cjk-fonts
  - google-noto-emoji-color-fonts
  - google-noto-sans-fonts
  - google-noto-serif-fonts
  - gparted
  - gperf
  - grub2
  - gtk4-devel
  - ImageMagick
  - less
  - libadwaita-devel
  - libva
  - libva-utils
  - libxml2
  - libxslt
  - lld
  - lldb
  - llvm
  - lutris
  - lz4
  - lzop
  - maven
  - mesa-vulkan-drivers
  - mpv
  - nano
  - ncurses-devel
  - NetworkManager
  - openssl-devel
  - pigz
  - pipewire
  - pipewire-alsa
  - pipewire-pulseaudio
  - pngcrush
  - protobuf-compiler
  - python3-protobuf
  - rhythmbox
  - rsync
  - rust
  - rustfmt
  - schedtool
  - SDL-devel
  - seahorse
  - squashfs-tools
  - sudo
  - system-config-printer
  - tree
  - vim
  - vlc
  - vulkan-loader
  - vulkan-tools
  - vulkan-validation-layers
  - wget
  - wireplumber
  - wpa_supplicant
  - zip
  - zlib-ng-compat-devel
  - zram-generator
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    dnf install -y
    glibc-devel.i686
    google-chrome-stable
    intel-media-driver
    libstdc++-devel.i686
    libva.i686
    libva-intel-driver
    mesa-vulkan-drivers.i686
    readline-devel.i686
    steam
    vulkan-loader.i686
    zlib-ng-compat-devel.i686;
    fi
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    dnf install -y kernel-devel-$(uname -r) &&
    INSTALLED_VER=$(dkms status r8152 | head -n1 | cut -d'/' -f2 | cut -d',' -f1 | tr -d ' ') &&
    rm -rf /tmp/realtek-r8152-dkms &&
    git clone --depth 1 https://github.com/awesometic/realtek-r8152-dkms.git /tmp/realtek-r8152-dkms &&
    REPO_VER=$(grep '^PACKAGE_VERSION=' /tmp/realtek-r8152-dkms/dkms.conf | cut -d'"' -f2) &&
    if [ "$INSTALLED_VER" != "$REPO_VER" ]; then
      cd /tmp/realtek-r8152-dkms &&
      ./dkms-install.sh &&
      dracut --force;
    fi
- action: command.run
  command: bash
  args:
  - -c
  - cargo install comtrya
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    flatpak install -y flathub
    io.jor.bugdom
    io.jor.bugdom2
    io.jor.cromagrally
    io.jor.nanosaur
    io.jor.nanosaur2
    io.jor.ottomatic
    io.jor.mightymike
    net.nokyan.Resources
    org.getoutline.OutlineClient
    org.getoutline.OutlineManager
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    if [ "$(uname -m)" = "x86_64" ]; then
    flatpak install -y flathub
    com.google.AndroidStudio;
    fi
- action: file.copy
  source: bashrc
  target: "{{ env.HOME }}/.bashrc"
- action: file.copy
  source: vimrc
  target: "{{ env.HOME }}/.vimrc"
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/locale.conf
  - /etc/locale.conf
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >-
    mkdir -p /etc/sysctl.d &&
    cp files/etc/sysctl.d/99-inotify.conf /etc/sysctl.d/99-inotify.conf &&
    restorecon -v /etc/sysctl.d/99-inotify.conf
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - cp files/etc/bash.bashrc /etc/profile.d/01-arch-prompt.sh && restorecon -v /etc/profile.d/01-arch-prompt.sh
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - bluetooth.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - chronyd.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - crond.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gdm.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gnome-remote-desktop.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-dispatcher.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-wait-online.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - sshd.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - set-default
  - graphical.target
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - cp {{ env.HOME }}/.config/monitors.xml /etc/xdg/monitors.xml && restorecon -v /etc/xdg/monitors.xml
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - mkdir -p /etc/dconf/db/gdm.d
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - cp files/etc/dconf/db/gdm.d/10-font-settings /etc/dconf/db/gdm.d/10-font-settings && restorecon -R -v /etc/dconf
- action: command.run
  privileged: true
  command: dconf
  args:
  - update

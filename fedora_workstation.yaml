where: os.name == "linux"
actions:
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/yum.repos.d/antigravity.repo
  - /etc/yum.repos.d/antigravity.repo
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/yum.repos.d/vscodium.repo
  - /etc/yum.repos.d/vscodium.repo
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: bash
  args:
  - -c
  - >
    curl -fLo /tmp/speedtest.rpm
    'https://packagecloud.io/ookla/speedtest-cli/packages/fedora/34/speedtest-1.2.0.84_1.ea6b6773cf-1.x86_64.rpm/download.rpm?distro_version_id=231'
    && rpm -ivh --nodigest --nosignature /tmp/speedtest.rpm
- action: command.run
  privileged: true
  where: os.arch == "aarch64"
  command: bash
  args:
  - -c
  - >
    curl -fLo /tmp/speedtest.rpm
    'https://packagecloud.io/ookla/speedtest-cli/packages/fedora/32/speedtest-1.1.1.28_1.c732eb82cf-1.aarch64.rpm/download.rpm?distro_version_id=216'
    && rpm -ivh --nodigest --nosignature /tmp/speedtest.rpm
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: cp
  args:
  - files/etc/yum.repos.d/google-chrome.repo
  - /etc/yum.repos.d/google-chrome.repo
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: cp
  args:
  - files/etc/yum.repos.d/rpmfusion-nonfree-nvidia-driver.repo
  - /etc/yum.repos.d/rpmfusion-nonfree-nvidia-driver.repo
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: cp
  args:
  - files/etc/yum.repos.d/rpmfusion-nonfree-steam.repo
  - /etc/yum.repos.d/rpmfusion-nonfree-steam.repo
- action: command.run
  privileged: true
  command: rpmkeys
  args:
  - --import
  - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/-/raw/master/pub.gpg
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: rpmkeys
  args:
  - --import
  - https://dl.google.com/linux/linux_signing_key.pub
- action: package.install
  list:
  - abattis-cantarell-fonts
  - alsa-sof-firmware
  - antigravity
  - bash-completion
  - bc
  - bluez
  - bluez-tools
  - brasero
  - cargo
  - ccache
  - chromium
  - chrony
  - clang
  - codium
  - cronie
  - cups
  - cups-pk-helper
  - curl
  - '@development-tools'
  - dos2unix
  - dracut
  - efibootmgr
  - elfutils-libelf-devel
  - flatpak
  - gcc
  - gdb
  - git-lfs
  - '@gnome-desktop'
  - gnome-extensions-app
  - gnome-shell-extension-appindicator
  - gnome-shell-extension-dash-to-dock
  - gnome-tweaks
  - gnupg2
  - gnutls-devel
  - golang
  - google-noto-cjk-fonts
  - google-noto-emoji-color-fonts
  - google-noto-sans-fonts
  - google-noto-serif-fonts
  - gparted
  - gperf
  - grub2
  - ImageMagick
  - less
  - libva
  - libva-utils
  - libxml2
  - libxslt
  - lldb
  - llvm
  - lutris
  - lz4
  - lzop
  - maven
  - mesa-vulkan-drivers
  - nano
  - ncurses-devel
  - NetworkManager
  - openssl-devel
  - pipewire
  - pipewire-alsa
  - pipewire-pulseaudio
  - pngcrush
  - protobuf-compiler
  - python3-protobuf
  - rhythmbox
  - rsync
  - rust
  - schedtool
  - SDL-devel
  - seahorse
  - squashfs-tools
  - sudo
  - system-config-printer
  - vim
  - vulkan-loader
  - vulkan-tools
  - vulkan-validation-layers
  - wget
  - wireplumber
  - wpa_supplicant
  - zip
  - zlib-ng-compat-devel
  - zram-generator
- action: package.install
  where: os.arch == "x86_64"
  list:
  - glibc-devel.i686
  - google-chrome-stable
  - gradle
  - intel-media-driver
  - libstdc++-devel.i686
  - libva.i686
  - libva-intel-driver
  - mesa-vulkan-drivers.i686
  - readline-devel.i686
  - steam
  - vulkan-loader.i686
  - zlib-ng-compat-devel.i686
- action: command.run
  command: bash
  args:
  - -c
  - cargo install comtrya
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - >
    flatpak install -y flathub
    io.jor.bugdom
    io.jor.bugdom2
    io.jor.cromagrally
    io.jor.nanosaur
    io.jor.nanosaur2
    io.jor.ottomatic
    io.jor.mightymike
- action: command.run
  privileged: true
  where: os.arch == "x86_64"
  command: bash
  args:
  - -c
  - >
    flatpak install -y flathub 
    com.google.AndroidStudio
- action: file.copy
  source: bashrc
  target: "{{ env.HOME }}/.bashrc"
- action: file.copy
  source: vimrc
  target: "{{ env.HOME }}/.vimrc"
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/locale.conf
  - /etc/locale.conf
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/bash.bashrc
  - /etc/profile.d/99-arch-prompt.sh
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - bluetooth.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - chronyd.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - crond.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gdm.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gnome-remote-desktop.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-dispatcher.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-wait-online.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - sshd.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - set-default
  - graphical.target
- action: command.run
  privileged: true
  command: restorecon
  args:
  - -v
  - /etc/profile.d/99-arch-prompt.sh
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - cp {{ env.HOME }}/.config/monitors.xml /etc/xdg/monitors.xml
- action: command.run
  privileged: true
  command: restorecon
  args:
  - -v
  - /etc/xdg/monitors.xml
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - mkdir -p /etc/dconf/db/gdm.d
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/dconf/db/gdm.d/10-font-settings
  - /etc/dconf/db/gdm.d/10-font-settings
- action: command.run
  privileged: true
  command: dconf
  args:
  - update
- action: command.run
  privileged: true
  command: restorecon
  args:
  - -R
  - -v
  - /etc/dconf

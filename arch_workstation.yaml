where: os.name == "linux"
actions:
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - pacman -Q jre-openjdk &>/dev/null && pacman -Rdd --noconfirm jre-openjdk || true
- action: package.install
  list:
  - base-devel
  - bash-completion
  - bash-preexec
  - bluez
  - bluez-utils
  - brasero
  - cantarell-fonts
  - ccache
  - chrony
  - clang
  - chromium
  - cronie
  - cups
  - cups-pk-helper
  - dos2unix
  - dracut
  - efibootmgr
  - erofs-utils
  - gcc
  - gdb
  - gnome
  - gnome-circle
  - gnome-extra
  - gnome-firmware
  - gnome-shell-extension-appindicator
  - gnome-shell-extension-dash-to-panel
  - gnome-shell-extension-desktop-icons-ng
  - gnome-shell-extension-vitals
  - gnome-shell-extensions
  - go
  - gparted
  - gradle
  - grub
  - gst-plugin-pipewire
  - gst-plugins-ugly
  - intel-ucode
  - less
  - lib32-libva-intel-driver
  - lib32-vulkan-asahi
  - lib32-vulkan-broadcom
  - lib32-vulkan-dzn
  - lib32-vulkan-freedreno
  - lib32-vulkan-gfxstream
  - lib32-vulkan-intel
  - lib32-vulkan-kosmickrisp
  - lib32-vulkan-nouveau
  - lib32-vulkan-panfrost
  - lib32-vulkan-powervr
  - lib32-vulkan-radeon
  - lib32-vulkan-swrast
  - lib32-vulkan-virtio
  - libpulse
  - libva-intel-driver
  - libva-nvidia-driver
  - libva-utils
  - linux
  - linux-firmware
  - linux-headers
  - linux-lts
  - linux-lts-headers
  - lldb
  - llvm
  - lutris
  - maven
  - mesa-utils
  - nano
  - networkmanager
  - noto-fonts
  - noto-fonts-cjk
  - noto-fonts-extra
  - nvidia-open
  - nvidia-utils
  - opencl-mesa
  - pacman-contrib
  - pipewire
  - pipewire-alsa
  - pipewire-jack
  - pipewire-pulse
  - power-profiles-daemon
  - rhythmbox
  - rsync
  - rust
  - seahorse
  - sof-firmware
  - steam
  - sudo
  - system-config-printer
  - vim
  - vulkan-devel
  - vulkan-intel
  - vulkan-mesa-layers
  - vulkan-radeon
  - wget
  - wireplumber
  - wpa_supplicant
  - zram-generator
- action: command.run
  command: bash
  args:
  - -c
  - if ! command -v yay &> /dev/null; then sudo pacman -S --needed --noconfirm git
    base-devel && git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin &&
    cd /tmp/yay-bin && makepkg -si --noconfirm && rm -rf /tmp/yay-bin; fi
- action: package.install
  provider: yay
  list:
  - airshipper
  - android-ndk
  - android-sdk-build-tools
  - android-sdk-cmdline-tools-latest
  - android-sdk-platform-tools
  - android-studio
  - antigravity
  - bugdom
  - bugdom2
  - comtrya
  - cro-mag-rally-net
  - dxvk-bin
  - gnome-icon-theme
  - gnome-icon-theme-symbolic
  - gnome-shell-extension-dash-to-dock
  - google-chrome
  - lineageos-devel
  - luxtorpeda-bin
  - maelstrom
  - makemkv
  - maniadrive
  - mightymike
  - mstflint
  - nanosaur
  - nanosaur2
  - ookla-speedtest-bin
  - openarena
  - ottomatic
  - payload-dumper-go-bin
  - steamcmd
  - tremulous-grangerhub-bin
  - tuxracer
  - unigine-heaven
  - ventoy-bin
  - vscodium-bin
- action: file.copy
  source: bashrc
  target: "{{ env.HOME }}/.bashrc"
- action: file.copy
  source: vimrc
  target: "{{ env.HOME }}/.vimrc"
- action: command.run
  privileged: true
  command: cp
  args:
  - files/grub
  - /etc/default/grub
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/bash.bashrc
  - /etc/bash.bashrc
# - action: command.run
#   privileged: true
#   command: cp
#   args:
#   - files/etc/pacman.conf
#   - /etc/pacman.conf
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/locale.conf
  - /etc/locale.conf
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/cron.daily/pacman-update
  - /etc/cron.daily/pacman-update
- action: command.run
  privileged: true
  command: ln
  args:
  - -sf
  - /usr/bin/vim
  - /usr/bin/vi
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - pacman -Q mkinitcpio &>/dev/null && pacman -Rsn --noconfirm mkinitcpio || true
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - bluetooth.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - chronyd.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - cronie.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - cups.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gdm.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - gnome-remote-desktop.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-dispatcher.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager-wait-online.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - NetworkManager.service
- action: command.run
  privileged: true
  command: systemctl
  args:
  - enable
  - sshd.service
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - cp {{ env.HOME }}/.config/monitors.xml /etc/xdg/monitors.xml
- action: command.run
  privileged: true
  command: bash
  args:
  - -c
  - mkdir -p /etc/dconf/db/gdm.d
- action: command.run
  privileged: true
  command: cp
  args:
  - files/etc/dconf/db/gdm.d/10-font-settings
  - /etc/dconf/db/gdm.d/10-font-settings
- action: command.run
  privileged: true
  command: dconf
  args:
  - update

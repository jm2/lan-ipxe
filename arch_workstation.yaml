- action: command.run
  command: bash
  args:
  - -c
  - if ! command -v yay &> /dev/null; then sudo pacman -S --needed --noconfirm git
    base-devel && git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin &&
    cd /tmp/yay-bin && makepkg -si --noconfirm && rm -rf /tmp/yay-bin; fi

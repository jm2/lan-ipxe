# win11_workstation.yaml
where: os.name == "windows"
actions:      
  - action: command.run
    command: powershell.exe
    args:
      - "-ExecutionPolicy"
      - "Bypass"
      - "-NoProfile"
      - "-Command"
      - "$h=(Get-WindowsOptionalFeature -FeatureName Microsoft-Hyper-V -Online -ErrorAction SilentlyContinue).State; if($h -eq 'Enabled'){exit 0}; $p=Get-ChildItem -Path \"$env:SystemRoot\\servicing\\Packages\" -Filter \"*Hyper-V*.mum\" -ErrorAction SilentlyContinue; if($p.Count -gt 0){ & \"$env:USERPROFILE\\lan-ipxe\\enable-hyperv-win11home.ps1\" }"
  - action: package.install
    provider: winget
    list:
      - 7zip.7zip
      - Apple.iTunes
      # - Blizzard.BattleNet # Broken due to interactive installer.
      # - Comtrya.Comtrya # Not present upstream yet.
      - ExtremeTuxRacer.ExtremeTuxRacer
      - GIMP.GIMP.3
      - Git.Git
      - GitHub.GitHubDesktop
      - GOG.Galaxy
      - GoLang.Go
      - Google.AndroidStudio
      - Google.Antigravity
      - Google.Chrome
      - Google.GoogleDrive
      - Google.PlatformTools
      - GuinpinSoft.MakeMKV
      - Inkscape.Inkscape
      - Jigsaw.OutlineManager
      # - Jigsaw.Outline # Not present upstream yet.
      - Kitware.CMake
      - LLVM.LLVM
      - MediaArea.MediaInfo.GUI
      - Meld.Meld
      - Microsoft.PowerShell
      - Microsoft.VisualStudio.Community
      - Microsoft.WindowsTerminal
      - Microsoft.WingetCreate
      - Microsoft.WSL
      - Mozilla.Firefox
      - mpv.net
      - MSYS2.MSYS2
      - Ninja-build.Ninja
      - Ookla.Speedtest.CLI
      - Ookla.Speedtest.Desktop
      - Plex.Plex
      - PuTTY.PuTTY
      - Python.Python.3.14
      - Rufus.Rufus
      - Rustlang.Rust.MSVC
      - Silicondust.HDHomeRun
      - SuperTux.SuperTux
      - SuperTuxKart.SuperTuxKart
      - Tailscale.Tailscale
      - Unigine.HeavenBenchmark
      - Valve.Steam
      - Ventoy.Ventoy
      - VideoLAN.VLC
      - VSCodium.VSCodium
      - WinDirStat.WinDirStat
      - WinSCP.WinSCP
      - WiresharkFoundation.Wireshark
      - Xming.Xming
  - action: package.install
    provider: winget
    where: os.arch == "x86_64"
    list:
      - Intel.IntelDriverAndSupportAssistant

# win11_workstation.yaml
actions:
  - id: check-hyperv-script
    command:
      run: Test-Path -Path "$env:USERPROFILE\lan-ipxe\enable-hyperv-win11home.ps1"
      
  - id: enable-hyper-v
    command:
      run: powershell.exe -ExecutionPolicy Bypass -File "$env:USERPROFILE\lan-ipxe\enable-hyperv-win11home.ps1"
      only_if: >
        powershell.exe -NoProfile -Command "
        $h=(Get-WindowsOptionalFeature -FeatureName Microsoft-Hyper-V -Online -ErrorAction SilentlyContinue).State;
        if($h -eq 'Enabled'){exit 1};
        $p=Get-ChildItem -Path \"$env:SystemRoot\servicing\Packages\" -Filter \"*Hyper-V*.mum\" -ErrorAction SilentlyContinue;
        if($p.Count -gt 0){exit 0}else{exit 1}"

  - id: install-core-utilities
    action: package.install
    provider: winget
    list:
      - 7zip.7zip
      - Apple.iTunes
      - Blizzard.BattleNet
      - Comtrya.Comtrya
      - ExtremeTuxRacer.ExtremeTuxRacer
      - GIMP.GIMP.3
      - Git.Git
      - GitHub.GitHubDesktop
      - GOG.Galaxy
      - GoLang.Go
      - Google.AndroidStudio
      - Google.Antigravity
      - Google.Chrome
      - Google.Drive
      - Google.PlatformTools
      - GuinpinSoft.MakeMKV
      - Inkscape.Inkscape
      - Jigsaw.OutlineManager
      - Kitware.CMake
      - MediaArea.MediaInfo.GUI
      - Meld.Meld
      - Microsoft.PowerShell
      - Microsoft.VisualStudio.Community
      - Microsoft.WindowsTerminal
      - Microsoft.WingetCreate
      - Microsoft.WSL
      - Mozilla.Firefox
      - mpv.net
      - MSYS2.MSYS2
      - Ninja-build.Ninja
      - Ookla.Speedtest.CLI
      - Ookla.Speedtest.Desktop
      - Plex.Plex
      - PuTTY.PuTTY
      - Python.Python.3.14
      - Rufus.Rufus
      - Rustlang.Rust.MSVC
      - SiliconDust.HDHomeRun
      - SuperTux.SuperTux
      - SuperTuxKart.SuperTuxKart
      - Tailscale.Tailscale
      - Unigine.HeavenBenchmark
      - Valve.Steam
      - Ventoy.Ventoy
      - VideoLAN.VLC
      - VSCodium.VSCodium
      - WinDirStat.WinDirStat
      - WinSCP.WinSCP
      - WiresharkFoundation.Wireshark
      - Xming.Xming

  - id: install-intel-dsa
    action: package.install
    provider: winget
    where: "powershell.exe -Command \"if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64') { exit 0 } else { exit 1 }\""
    list:
      - Intel.IntelDriverAndSupportAssistant
